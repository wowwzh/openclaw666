<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>Markdown Todo</title>
  <style>
    body{font-family:system-ui,sans-serif;max-width:800px;margin:2rem auto;padding:0 1rem;background:#f5f5f5}
    h1{text-align:center;color:#333}
    .input-wrap{display:flex;gap:0.5rem;margin-bottom:1rem}
    input{flex:1;padding:0.75rem;border:2px solid #ddd;border-radius:8px;font-size:1rem}
    button{padding:0.75rem 1.5rem;background:#4f46e5;color:white;border:none;border-radius:8px;cursor:pointer}
    .todo{background:white;padding:1rem;border-radius:8px;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.5rem}
    .todo.done{opacity:0.6}
    .todo.done span{text-decoration:line-through}
    .todo input{width:auto}
    .todo span{flex:1}
    .del{background:#ef4444;padding:0.5rem 1rem}
  </style>
</head>
<body>
  <h1>📝 Markdown待办</h1>
  <div class="input-wrap">
    <input id="input" placeholder="输入待办...">
    <button onclick="add()">添加</button>
  </div>
  <div id="list"></div>
  <script>
    let todos=JSON.parse(localStorage.getItem('mdTodos')||'[]');
    function render(){
      document.getElementById('list').innerHTML=todos.map((t,i)=>`<div class="todo ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggle(${i})"><span>${t.text}</span><button class="del" onclick="del(${i})">×</button></div>`).join('');
      localStorage.setItem('mdTodos',JSON.stringify(todos));
    }
    function add(){
      const v=document.getElementById('input').value.trim();
      if(v){todos.push({text:v,done:false});document.getElementById('input').value='';render();}
    }
    function toggle(i){todos[i].done=!todos[i].done;render();}
    function del(i){todos.splice(i,1);render();}
    document.getElementById('input').onkeydown=e=>e.key==='Enter'&&add();
    render();
  </script>
</body>
</html>
