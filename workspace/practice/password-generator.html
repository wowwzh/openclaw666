<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>幼楚的随机密码</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .container { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); text-align: center; }
    h1 { color: #333; margin-bottom: 1.5rem; }
    .display { background: #f1f5f9; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 1.25rem; margin-bottom: 1rem; word-break: break-all; }
    .options { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
    label { display: flex; align-items: center; gap: 0.25rem; font-size: 0.875rem; color: #64748b; }
    input[type="checkbox"] { width: 16px; height: 16px; }
    .length { margin-bottom: 1rem; }
    .length input { width: 60px; padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 4px; text-align: center; }
    button { padding: 0.75rem 1.5rem; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; margin: 0.25rem; }
    .generate { background: #10b981; color: white; }
    .copy { background: #3b82f6; color: white; }
    .tips { font-size: 0.8rem; color: #94a3b8; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 随机密码生成器</h1>
    <div class="display" id="display">点击生成</div>
    <div class="options">
      <label><input type="checkbox" id="upper" checked> 大写A-Z</label>
      <label><input type="checkbox" id="lower" checked> 小写a-z</label>
      <label><input type="checkbox" id="number" checked> 数字0-9</label>
      <label><input type="checkbox" id="symbol" checked> 符号!@#$</label>
    </div>
    <div class="length">长度: <input type="number" id="len" value="16" min="4" max="64"></div>
    <button class="generate" onclick="generate()">生成密码</button>
    <button class="copy" onclick="copy()">复制</button>
    <div class="tips" id="tips"></div>
  </div>
  <script>
    function generate() {
      const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      const lower = 'abcdefghijklmnopqrstuvwxyz';
      const number = '0123456789';
      const symbol = '!@#$%^&*()_+-=[]{}|;:,.<>?';
      let chars = '';
      if (document.getElementById('upper').checked) chars += upper;
      if (document.getElementById('lower').checked) chars += lower;
      if (document.getElementById('number').checked) chars += number;
      if (document.getElementById('symbol').checked) chars += symbol;
      if (!chars) { document.getElementById('tips').textContent = '请至少选择一种字符类型'; return; }
      const len = parseInt(document.getElementById('len').value);
      let password = '';
      for (let i = 0; i < len; i++) password += chars[Math.floor(Math.random() * chars.length)];
      document.getElementById('display').textContent = password;
      document.getElementById('tips').textContent = '';
 copy() {
      const pwd    }
    function = document.getElementById('display').textContent;
      if (pwd === '点击生成') return;
      navigator.clipboard.writeText(pwd);
      document.getElementById('tips').textContent = '✓ 已复制到剪贴板';
    }
  </script>
</body>
</html>
