<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>CSS动画库</title>
<style>
body{font-family:system-ui;padding:2rem;background:#f5f5f5}
.card{width:200px;height:200px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;margin:1rem;display:inline-block}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:translateX(0)}}
.bounce{animation:bounce 1s ease infinite}
.pulse{animation:pulse 2s ease infinite}
.shake{animation:shake 0.5s ease infinite}
.fadeIn{animation:fadeIn 1s ease forwards}
.slideIn{animation:slideIn 1s ease forwards}
h2{margin-bottom:1rem}
</style>
</head>
<body>
<h2>CSS动画库</h2>
<div class="card bounce"></div>
<div class="card pulse"></div>
<div class="card shake"></div>
<div class="card fadeIn" style="opacity:0"></div>
<div class="card slideIn" style="opacity:0"></div>
</body>
</html>
