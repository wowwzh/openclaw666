<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown预览器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      background: #f5f5f5;
    }
    .editor, .preview {
      flex: 1;
      padding: 1rem;
      overflow: auto;
    }
    .editor {
      border-right: 1px solid #ddd;
      background: #fff;
    }
    textarea {
      width: 100%;
      height: 100%;
      border: none;
      resize: none;
      font-family: 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      outline: none;
    }
    .preview {
      background: #fff;
    }
    .preview h1 { border-bottom: 2px solid #eee; padding-bottom: 0.5rem; margin-bottom: 1rem; }
    .preview h2 { border-bottom: 1px solid #eee; padding-bottom: 0.3rem; margin: 1rem 0 0.5rem; }
    .preview p { margin-bottom: 0.75rem; line-height: 1.7; }
    .preview code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
    .preview pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 8px; overflow-x: auto; }
    .preview pre code { background: none; padding: 0; }
    .preview ul, .preview ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
    .preview li { margin-bottom: 0.25rem; }
    .preview blockquote { border-left: 4px solid #ddd; padding-left: 1rem; color: #666; margin: 1rem 0; }
  </style>
</head>
<body>
  <div class="editor">
    <textarea id="input" placeholder="输入Markdown..."># 标题1
## 标题2

**粗体** 和 *斜体*

- 列表1
- 列表2

> 引用

`代码`

```js
console.log('hello');
```</textarea>
  </div>
  <div class="preview" id="output"></div>
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    
    function render() {
      let html = input.value
        .replace(/^### (.*$)/gm, '<h3>$1</h3>')
        .replace(/^## (.*$)/gm, '<h2>$1</h2>')
        .replace(/^# (.*$)/gm, '<h1>$1</h1>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^- (.*$)/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
        .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/\n/g, '<br>');
      output.innerHTML = html;
    }
    
    input.addEventListener('input', render);
    render();
  </script>
</body>
</html>
