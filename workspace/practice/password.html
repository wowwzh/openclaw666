<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>随机密码生成</title>
  <style>
    body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1e293b}
    .card{background:white;padding:2rem;border-radius:12px;text-align:center}
    input{width:200px;padding:10px;font-size:16px;border:2px solid #e2e8f0;border-radius:8px;margin-bottom:10px}
    button{padding:10px 20px;background:#10b981;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;margin:5px}
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 密码生成器</h2>
    <input id="pwd" readonly>
    <br>
    <button onclick="gen(8)">8位</button>
    <button onclick="gen(12)">12位</button>
    <button onclick="gen(16)">16位</button>
  </div>
  <script>
    function gen(len){
      const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
      let pwd='';
      for(let i=0;i<len;i++)pwd+=chars[Math.floor(Math.random()*chars.length)];
      document.getElementById('pwd').value=pwd;
    }
  </script>
</body>
</html>
