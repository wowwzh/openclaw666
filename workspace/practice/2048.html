<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>2048游戏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #faf8ef; }
    h1 { font-size: 60px; color: #776e65; margin-bottom: 10px; }
    .score-box { background: #bbada0; padding: 5px 20px; border-radius: 6px; color: white; font-size: 20px; margin-bottom: 10px; }
    .game { width: 400px; height: 400px; background: #bbada0; border-radius: 6px; padding: 10px; position: relative; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; height: 100%; }
    .cell { background: #cdc1b4; border-radius: 3px; display: flex; justify-content: center; align-items: center; font-size: 40px; font-weight: bold; color: #776e65; }
    .game-over { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(238, 228, 218, 0.73); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 6px; }
    .game-over button { padding: 10px 20px; background: #8f7a66; color: white; border: none; border-radius: 3px; font-size: 18px; cursor: pointer; margin-top: 10px; }
    .tile-2 { background: #eee4da; } .tile-4 { background: #ede0c8; }
    .tile-8 { background: #f2b179; color: white; }
    .tile-16 { background: #f59563; color: white; }
    .tile-32 { background: #f67c5f; color: white; }
    .tile-64 { background: #f65e3b; color: white; }
    .tile-128 { background: #edcf72; color: white; font-size: 32px; }
    .tile-256 { background: #edcc61; color: white; font-size: 32px; }
    .tile-512 { background: #edc850; color: white; font-size: 32px; }
    .tile-1024 { background: #edc53f; color: white; font-size: 24px; }
    .tile-2048 { background: #edc22e; color: white; font-size: 24px; }
  </style>
</head>
<body>
  <h1>2048</h1>
  <div class="score-box">得分: <span id="score">0</span></div>
  <div class="game" id="game">
    <div class="grid" id="grid"></div>
    <div class="game-over" id="gameOver" style="display: none;">
      <h2>游戏结束!</h2>
      <button onclick="init()">再来一局</button>
    </div>
  </div>
  <p style="color: #776e65; margin-top: 15px;">使用方向键或滑动屏幕</p>
  <script>
    const grid = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const gameOverEl = document.getElementById('gameOver');
    let board = [], score = 0;
    
    function init() {
      board = Array(4).fill(null).map(() => Array(4).fill(0));
      score = 0;
      scoreEl.textContent = 0;
      gameOverEl.style.display = 'none';
      addRandomTile();
      addRandomTile();
      render();
    }
    
    function addRandomTile() {
      const empty = [];
      for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) if (!board[i][j]) empty.push([i, j]);
      if (!empty.length) return;
      const [i, j] = empty[Math.floor(Math.random() * empty.length)];
      board[i][j] = Math.random() < 0.9 ? 2 : 4;
    }
    
    function render() {
      grid.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
          const cell = document.createElement('div');
          cell.className = 'cell' + (board[i][j] ? ` tile-${board[i][j]}` : '');
          cell.textContent = board[i][j] || '';
          grid.appendChild(cell);
        }
      }
    }
    
    function move(direction) {
      let moved = false;
      const rotate = () => {
        board = board[0].map((_, i) => board.map(row => row[i]).reverse());
      };
      const compress = () => {
        for (let i = 0; i < 4; i++) {
          let row = board[i].filter(x => x);
          for (let j = 0; j < row.length - 1; j++) {
            if (row[j] === row[j+1]) { row[j] *= 2; score += row[j]; row.splice(j+1, 1); }
          }
          while (row.length < 4) row.push(0);
          if (row.join(',') !== board[i].join(',')) moved = true;
          board[i] = row;
        }
      };
      
      if (direction === 'left') { compress(); }
      else if (direction === 'right') { board = board.map(r => r.reverse()); compress(); board = board.map(r => r.reverse()); }
      else if (direction === 'up') { rotate(); rotate(); rotate(); compress(); rotate(); }
      else if (direction === 'down') { rotate(); compress(); rotate(); rotate(); rotate(); }
      
      if (moved) { scoreEl.textContent = score; addRandomTile(); render(); checkGameOver(); }
    }
    
    function checkGameOver() {
      for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) if (!board[i][j]) return;
      for (let i = 0; i < 4; i++) for (let j = 0; j < 4; j++) {
        if (i < 3 && board[i][j] === board[i+1][j]) return;
        if (j < 3 && board[i][j] === board[i][j+1]) return;
      }
      gameOverEl.style.display = 'flex';
    }
    
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') move('left');
      else if (e.key === 'ArrowRight') move('right');
      else if (e.key === 'ArrowUp') move('up');
      else if (e.key === 'ArrowDown') move('down');
    });
    
    init();
  </script>
</body>
</html>
