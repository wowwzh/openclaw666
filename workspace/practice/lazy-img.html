<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>渐进式加载图片</title>
  <style>
    body{font-family:sans-serif;padding:2rem;background:#f5f5f5}
    .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
    .img-wrap{background:white;padding:0.5rem;border-radius:8px;overflow:hidden}
    .img-wrap img{width:100%;height:150px;object-fit:cover;opacity:0;transition:opacity 0.5s}
    .img-wrap img.loaded{opacity:1}
  </style>
</head>
<body>
  <h2>🖼️ 渐进式加载</h2>
  <div class="gallery" id="gallery"></div>
  <script>
    const urls=[
      'https://picsum.photos/400/300?1',
      'https://picsum.photos/400/300?2',
      'https://picsum.photos/400/300?3',
      'https://picsum.photos/400/300?4',
      'https://picsum.photos/400/300?5',
      'https://picsum.photos/400/300?6',
    ];
    const gallery=document.getElementById('gallery');
    urls.forEach(url=>{
      const div=document.createElement('div');
      div.className='img-wrap';
      const img=new Image();
      img.onload=()=>img.classList.add('loaded');
      img.src=url;
      div.appendChild(img);
      gallery.appendChild(div);
    });
  </script>
</body>
</html>
