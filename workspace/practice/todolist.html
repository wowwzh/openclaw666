<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>幼楚的待办清单</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 2rem; }
    .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    h1 { color: #333; margin-bottom: 1rem; text-align: center; }
    .input-group { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    input { flex: 1; padding: 0.75rem; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; }
    button { padding: 0.75rem 1.5rem; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    ul { list-style: none; }
    li { display: flex; align-items: center; padding: 0.75rem; border-bottom: 1px solid #f1f5f9; }
    li.completed { text-decoration: line-through; color: #94a3b8; }
    .checkbox { width: 20px; height: 20px; margin-right: 0.75rem; cursor: pointer; }
    .delete { margin-left: auto; background: #ef4444; color: white; border: none; padding: 0.25rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 我的待办</h1>
    <div class="input-group">
      <input type="text" id="todoInput" placeholder="添加新任务...">
      <button onclick="addTodo()">添加</button>
    </div>
    <ul id="todoList"></ul>
  </div>
  <script>
    let todos = JSON.parse(localStorage.getItem('mytodos') || '[]');
    function render() {
      const list = document.getElementById('todoList');
      list.innerHTML = todos.map((t, i) => `<li class="${t.done ? 'completed' : ''}">
        <input type="checkbox" class="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${i})">
        ${t.text}
        <button class="delete" onclick="deleteTodo(${i})">删除</button>
      </li>`).join('');
      localStorage.setItem('mytodos', JSON.stringify(todos));
    }
    function addTodo() {
      const input = document.getElementById('todoInput');
      if (input.value.trim()) { todos.push({ text: input.value, done: false }); input.value = ''; render(); }
    }
    function toggle(i) { todos[i].done = !todos[i].done; render(); }
    function deleteTodo(i) { todos.splice(i, 1); render(); }
    render();
  </script>
</body>
</html>
