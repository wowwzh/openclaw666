<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>幼楚的猜数字</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .game { background: white; padding: 2rem; border-radius: 16px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    h1 { color: #333; margin-bottom: 1rem; }
    input { padding: 0.75rem; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 8px; width: 150px; text-align: center; }
    button { padding: 0.75rem 1.5rem; font-size: 1rem; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; margin-left: 0.5rem; }
    .hint { margin-top: 1rem; color: #666; }
    .result { margin-top: 1rem; font-size: 1.2rem; font-weight: bold; }
    .win { color: #10b981; }
    .lose { color: #ef4444; }
  </style>
</head>
<body>
  <div class="game">
    <h1>🔢 猜数字游戏</h1>
    <p style="color:#666;margin-bottom:1rem">1-100之间的数字</p>
    <input type="number" id="guess" placeholder="输入数字">
    <button onclick="check()">猜测</button>
    <div class="result" id="result"></div>
    <div class="hint" id="hint"></div>
    <p style="margin-top:1rem;color:#999;font-size:0.8rem">剩余次数: <span id="chance">6</span></p>
  </div>
  <script>
    const target = Math.floor(Math.random() * 100) + 1;
    let chance = 6;
    const result = document.getElementById('result');
    const hint = document.getElementById('hint');
    const chanceEl = document.getElementById('chance');
    function check() {
      const num = parseInt(document.getElementById('guess').value);
      if (!num || num < 1 || num > 100) { result.textContent = '请输入1-100的数！'; result.className = 'result'; return; }
      chance--;
      chanceEl.textContent = chance;
      if (num === target) { result.textContent = '🎉 恭喜猜对了！'; result.className = 'result win'; hint.textContent = `答案就是${target}`; }
      else if (chance === 0) { result.textContent = '😢 游戏结束！'; result.className = 'result lose'; hint.textContent = `正确答案是${target}`; }
      else if (num > target) { result.textContent = '太大了！'; result.className = 'result'; hint.textContent = `还有${chance}次机会`; }
      else { result.textContent = '太小了！'; result.className = 'result'; hint.textContent = `还有${chance}次机会`; }
    }
  </script>
</body>
</html>
