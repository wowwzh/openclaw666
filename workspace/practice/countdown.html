<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>幼楚的倒计时</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .timer { text-align: center; background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
    h1 { color: #333; margin-bottom: 1rem; }
    input { padding: 0.75rem; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 8px; width: 120px; text-align: center; margin-right: 0.5rem; }
    button { padding: 0.75rem 1.5rem; font-size: 1rem; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .display { font-size: 72px; font-weight: bold; color: #333; margin: 1.5rem 0; font-variant-numeric: tabular-nums; }
    .tips { color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="timer">
    <h1>⏰ 倒计时</h1>
    <div>
      <input type="number" id="minutes" placeholder="分钟" min="1" max="999">
      <button onclick="startCountdown()">开始</button>
    </div>
    <div class="display" id="display">00:00</div>
    <div class="tips" id="tips">请输入分钟数</div>
  </div>
  <script>
    let interval;
    const display = document.getElementById('display');
    const tips = document.getElementById('tips');
    
    function startCountdown() {
      const min = parseInt(document.getElementById('minutes').value);
      if (!min || min < 1) { tips.textContent = '请输入有效分钟数！'; return; }
      
      let totalSeconds = min * 60;
      clearInterval(interval);
      tips.textContent = `倒计时 ${min} 分钟...`;
      
      interval = setInterval(() => {
        totalSeconds--;
        const m = Math.floor(totalSeconds / 60);
        const s = totalSeconds % 60;
        display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        
        if (totalSeconds <= 0) {
          clearInterval(interval);
          tips.textContent = '⏰ 时间到！';
          display.style.color = '#10b981';
        }
      }, 1000);
    }
  </script>
</body>
</html>
