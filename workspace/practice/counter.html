<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>字数统计</title>
  <style>
    body{font-family:sans-serif;display:flex;justify-content:center;padding:2rem;background:#f8fafc}
    .card{background:white;padding:2rem;border-radius:12px;max-width:600px;width:100%}
    textarea{width:100%;height:150px;padding:10px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px;resize:vertical;box-sizing:border-box}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:1rem}
    .stat{background:#f1f5f9;padding:1rem;border-radius:8px;text-align:center}
    .stat-num{font-size:1.5rem;font-weight:bold;color:#3b82f6}
    .stat-label{font-size:0.8rem;color:#64748b}
  </style>
</head>
<body>
  <div class="card">
    <h2>✍️ 字数统计</h2>
    <textarea id="input" placeholder="输入文字..." oninput="count()"></textarea>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="chars">0</div><div class="stat-label">字符</div></div>
      <div class="stat"><div class="stat-num" id="charsNoSpace">0</div><div class="stat-label">字符(去空格)</div></div>
      <div class="stat"><div class="stat-num" id="words">0</div><div class="stat-label">单词</div></div>
      <div class="stat"><div class="stat-num" id="lines">0</div><div class="stat-label">行数</div></div>
    </div>
  </div>
  <script>
    function count(){
      const t=document.getElementById('input').value;
      document.getElementById('chars').innerText=t.length;
      document.getElementById('charsNoSpace').innerText=t.replace(/\s/g,'').length;
      document.getElementById('words').innerText=t.trim()?t.trim().split(/\s+/).length:0;
      document.getElementById('lines').innerText=t.split('\n').length;
    }
  </script>
</body>
</html>
