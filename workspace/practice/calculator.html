# 练习: 简易计算器

## 功能
- 加减乘除
- 键盘输入
- 历史记录

## 预览
```html
<!DOCTYPE html>
<html>
<head>
  <style>
    body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f0f0}
    .calc{background:#fff;padding:20px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
    input{width:100%;padding:15px;font-size:24px;text-align:right;border:1px solid #ddd;border-radius:8px;margin-bottom:10px;box-sizing:border-box}
    .btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    button{padding:15px;font-size:18px;border:none;border-radius:8px;cursor:pointer;background:#f5f5f5;transition:0.2s}
    button:hover{background:#e0e0e0}
    button.eq{background:#667eea;color:#fff;grid-column:span 2}
    button.eq:hover{background:#5568d3}
  </style>
</head>
<body>
  <div class="calc">
    <input id="display" readonly>
    <div class="btns">
      <button onclick="clear()">C</button>
      <button onclick="back()">←</button>
      <button onclick="add('%')">%</button>
      <button onclick="add('/')">÷</button>
      <button onclick="add('7')">7</button>
      <button onclick="add('8')">8</button>
      <button onclick="add('9')">9</button>
      <button onclick="add('*')">×</button>
      <button onclick="add('4')">4</button>
      <button onclick="add('5')">5</button>
      <button onclick="add('6')">6</button>
      <button onclick="add('-')">-</button>
      <button onclick="add('1')">1</button>
      <button onclick="add('2')">2</button>
      <button onclick="add('3')">3</button>
      <button onclick="add('+')">+</button>
      <button onclick="add('0')">0</button>
      <button onclick="add('.')">.</button>
      <button class="eq" onclick="calc()">=</button>
    </div>
  </div>
  <script>
    const d=document.getElementById('display');
    function add(v){d.value+=v}
    function clear(){d.value=''}
    function back(){d.value=d.value.slice(0,-1)}
    function calc(){try{d.value=eval(d.value)}catch{d.value='Error'}}
  </script>
</body>
</html>
```
