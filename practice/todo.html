<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人待办事项</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; }
        .card { background: rgba(255,255,255,0.95); }
        .task-item { transition: all 0.3s; }
        .task-item:hover { transform: translateX(5px); }
        .completed { text-decoration: line-through; opacity: 0.6; }
        .priority-high { border-left: 4px solid #ef4444; }
        .priority-medium { border-left: 4px solid #f59e0b; }
        .priority-low { border-left: 4px solid #10b981; }
    </style>
</head>
<body>
    <div id="app" class="container mx-auto px-4 py-8 max-w-2xl">
        <h1 class="text-3xl font-bold text-center text-white mb-8">📝 个人待办事项</h1>
        
        <!-- 添加任务 -->
        <div class="card rounded-2xl p-6 mb-6 shadow-lg">
            <div class="flex gap-2 mb-4">
                <input v-model="newTask.title" placeholder="任务标题" class="flex-1 px-4 py-2 border rounded-lg">
                <select v-model="newTask.priority" class="px-4 py-2 border rounded-lg">
                    <option value="high">高优先级</option>
                    <option value="medium">中优先级</option>
                    <option value="low">低优先级</option>
                </select>
            </div>
            <textarea v-model="newTask.desc" placeholder="任务描述（可选）" class="w-full px-4 py-2 border rounded-lg mb-4" rows="2"></textarea>
            <button @click="addTask" class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700">添加任务</button>
        </div>
        
        <!-- 筛选 -->
        <div class="flex gap-2 mb-4">
            <button @click="filter='all'" :class="filter==='all'?'bg-purple-600':'bg-gray-600'" class="px-4 py-1 rounded text-white">全部 {{ tasks.length }}</button>
            <button @click="filter='pending'" :class="filter==='pending'?'bg-purple-600':'bg-gray-600'" class="px-4 py-1 rounded text-white">待办 {{ pendingCount }}</button>
            <button @click="filter='completed'" :class="filter==='completed'?'bg-purple-600':'bg-gray-600'" class="px-4 py-1 rounded text-white">已完成 {{ completedCount }}</button>
        </div>
        
        <!-- 任务列表 -->
        <div class="space-y-3">
            <div v-for="task in filteredTasks" :key="task.id" 
                 class="card rounded-xl p-4 shadow task-item"
                 :class="'priority-'+task.priority">
                <div class="flex items-start gap-3">
                    <input type="checkbox" v-model="task.completed" @change="save" class="mt-1 w-5 h-5">
                    <div class="flex-1">
                        <h3 :class="{'completed':task.completed}" class="font-semibold text-lg">{{ task.title }}</h3>
                        <p v-if="task.desc" class="text-gray-500 text-sm">{{ task.desc }}</p>
                        <div class="flex gap-2 mt-2">
                            <span class="text-xs px-2 py-1 rounded"
                                  :class="{'bg-red-100 text-red-600':task.priority=='high','bg-yellow-100 text-yellow-600':task.priority=='medium','bg-green-100 text-green-600':task.priority=='low'}">
                                {{ task.priority=='high'?'高':task.priority=='medium'?'中':'低' }}优先
                            </span>
                            <span class="text-xs text-gray-400">{{ task.created }}</span>
                        </div>
                    </div>
                    <button @click="deleteTask(task.id)" class="text-red-500 hover:text-red-700">🗑️</button>
                </div>
            </div>
        </div>
        
        <div v-if="filteredTasks.length===0" class="text-center text-white py-12">
            <p class="text-xl">暂无任务</p>
            <p class="text-gray-400">添加一个任务开始吧</p>
        </div>
        
        <!-- 统计 -->
        <div class="mt-8 card rounded-xl p-4 text-center">
            <p class="text-gray-600">已完成 <span class="text-green-600 font-bold">{{ completedCount }}</span> / 总计 <span class="font-bold">{{ tasks.length }}</span></p>
            <div class="w-full bg-gray-200 rounded-full h-2 mt-2">
                <div class="bg-green-500 h-2 rounded-full" :style="{width: progress+'%'}"></div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const tasks = ref([]);
                const newTask = ref({title: '', desc: '', priority: 'medium'});
                const filter = ref('all');
                
                onMounted(() => {
                    const saved = localStorage.getItem('todo_tasks');
                    if (saved) tasks.value = JSON.parse(saved);
                });
                
                const save = () => localStorage.setItem('todo_tasks', JSON.stringify(tasks.value));
                
                const addTask = () => {
                    if (!newTask.value.title.trim()) return;
                    tasks.value.unshift({
                        id: Date.now(),
                        title: newTask.value.title,
                        desc: newTask.value.desc,
                        priority: newTask.value.priority,
                        completed: false,
                        created: new Date().toLocaleDateString()
                    });
                    newTask.value = {title: '', desc: '', priority: 'medium'};
                    save();
                };
                
                const deleteTask = (id) => {
                    if (confirm('确定删除？')) {
                        tasks.value = tasks.value.filter(t => t.id !== id);
                        save();
                    }
                };
                
                const filteredTasks = computed(() => {
                    if (filter.value === 'pending') return tasks.value.filter(t => !t.completed);
                    if (filter.value === 'completed') return tasks.value.filter(t => t.completed);
                    return tasks.value;
                });
                
                const pendingCount = computed(() => tasks.value.filter(t => !t.completed).length);
                const completedCount = computed(() => tasks.value.filter(t => t.completed).length);
                const progress = computed(() => tasks.value.length ? (completedCount.value / tasks.value.length * 100) : 0);
                
                return { tasks, newTask, filter, addTask, deleteTask, filteredTasks, pendingCount, completedCount, progress, save };
            }
        }).mount('#app');
    </script>
</body>
</html>
