<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator Test Demo</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      
      .calculator {
        background: #1a1a1a;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 320px;
      }
      
      .display {
        background: #2d2d2d;
        color: white;
        font-size: 48px;
        text-align: right;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        min-height: 80px;
        overflow: hidden;
      }
      
      .keypad {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      
      button {
        padding: 20px;
        font-size: 24px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
      }
      
      button:active {
        transform: scale(0.95);
      }
      
      .digit-btn {
        background: #3d3d3d;
        color: white;
      }
      
      .digit-btn:hover {
        background: #4d4d4d;
      }
      
      .operator-btn {
        background: #ff9500;
        color: white;
      }
      
      .operator-btn:hover {
        background: #ffaa33;
      }
      
      .function-btn {
        background: #a5a5a5;
        color: black;
      }
      
      .function-btn:hover {
        background: #b5b5b5;
      }
      
      .zero-btn {
        grid-column: span 2;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
